<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Like</title>
    <link rel="stylesheet" href="like.css" />
  </head>

  <body>
    <nav class="topbar">
      <a href="index.html" class="unihome">
        <img src="Other/Images/Prof.png" class="bing">
      </a>
      <a href="index.html" class="navlink">Home</a>
      <a href="about.html" class="navlink">About</a>
      <a href="projects.html" class="navlink">Projects</a>
      <a href="contact.html" class="navlink">Contact</a>
      <a href="like.html" class="navlink">Like</a>
      <a href="documents.html" class="navlink">Documents</a>
      <a href="news.html" class="navlink">News</a>
    </nav>
    <main class="All">  
      <video class = "vidback" autoplay muted loop playsinline>
        <source src="Other/Videos/rose.mp4" type="video/mp4" />
      </video>

      <div class="Writing">
        <h1>Leave a like</h1>
        <p>Enjoyed exploring the site? Show some love!</p>
        <div class="Two">
          <div class="Lbutton">
            <button id="Lb">🤍</button>
          </div>
          <div class="Lcounter">
            <p id="Lc">Likes: 0</p>
          </div>
        </div>
      </div>
    </main>

  <script>
  const likeBtn = document.getElementById("Lb");
  const likeCount = document.getElementById("Lc");

  let count = localStorage.getItem("likeCount");

  if (count === null) {
    count = 0;
  }

  likeCount.textContent = "Likes: " + count;

  let liked = localStorage.getItem("liked");

  if (liked === "true") {
    likeBtn.disabled = true;
    likeBtn.textContent = "🧡";
    likeBtn.classList.add("liked");
  }

  likeBtn.addEventListener("click", () => {

    if (liked === "true") return;

    count++;
    likeCount.textContent = "Likes: " + count;

    likeBtn.classList.add("liked");
    likeBtn.classList.add("animateLike");

    localStorage.setItem("likeCount", count);
    localStorage.setItem("liked", "true");

    likeBtn.disabled = true;
    likeBtn.textContent = "🧡";

  });
  </script>

  </body>
</html>
