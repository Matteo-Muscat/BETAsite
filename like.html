<html lang="en">

  <body>
    <nav class="topbar">
      <a href="index.html" class="unihome">
        <img src="Other/Images/Prof.png" class="bing">

      <a href="index.html" class="navlink">Home</a>

      <a href="documents.html" class="navlink">Documents</a>
      <a href="news.html" class="navlink">News</a>
    </nav>
    <main class="All">  
      <video class = "vidback" autoplay muted loop playsinline>
        <source src="https://pub-9dd7b1b520354911979c4b7d7333e27f.r2.dev/rose.mp4" type="video/mp4" />
      </video>

      <div class="Writing">
        <h1>Leave a like</h1>
        <p>Enjoyed exploring the site? Show some love!</p>
        <div class="Two">
          <div class="Lbutton">
            <button id="Lb">🤍</button>
          </div>
          <div class="Lcounter">
            <p id="Lc">Likes: 0</p>
          </div>
        </div>
      </div>
    </main>


  <script>
    const likeBtn = document.getElementById("Lb");
    const likeCount = document.getElementById("Lc");
    const pageName = "like";

    let liked = localStorage.getItem("liked-like");

    async function loadLikes() {
      try {
        const response = await fetch(`/api/likes?page=${pageName}`, {
          cache: "no-store"
        });

        const data = await response.json();

        if (response.ok) {
          likeCount.textContent = "Likes: " + data.count;
        } else {
          console.error(data.error);
          likeCount.textContent = "Likes: 0";
        }
      } catch (error) {
        console.error("Failed to load likes:", error);
        likeCount.textContent = "Likes: 0";
      }
    }

    async function sendLike() {
      try {
        const response = await fetch("/api/like", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ page: pageName })
        });

        const data = await response.json();

        if (response.ok) {
          likeCount.textContent = "Likes: " + data.count;
          return true;
        } else {
          console.error(data.error);
          return false;
        }
      } catch (error) {
        console.error("Failed to send like:", error);
        return false;
      }
    }

    if (liked === "true") {
      likeBtn.disabled = true;
      likeBtn.textContent = "🧡";
      likeBtn.classList.add("liked");
    }

    likeBtn.addEventListener("click", async () => {
      if (liked === "true") return;

      const success = await sendLike();
      if (!success) return;

      likeBtn.classList.add("liked");
      likeBtn.classList.add("animateLike");

      localStorage.setItem("liked-like", "true");
      liked = "true";

      likeBtn.disabled = true;
      likeBtn.textContent = "🧡";
    });

    loadLikes();
  </script>

  <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
